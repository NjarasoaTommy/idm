<f-flow
  fDraggable
  (fCreateNode)="onCreateNode($event)"
  (fCreateConnection)="onCreateConnection($event)"
>
  <f-canvas>
    <f-connection-for-create/><!-- For dynamic creation of connection -->

    <!-- Get all nodes (both connection side(in and out)) -->
    <app-node
      *ngFor="let node of node_list"
      fNode
      fDragHandle
      [node_type]="node.node_type"
      [node_id]="node.node_id"
      [node_title]="node.node_title"
      [node_attributes]="node.node_attributes"
      [fNodePosition]="node.node_position"
      [showNodeForm]="show_node_form"
    >
      <ng-container node-connectors>
        <!-- Add input connector side in the 4 sides -->
        <div fNodeInput fInputMultiple [fInputId]="node.node_input_id + '1'" fInputConnectableSide="top" class="top"></div>
        <div fNodeInput fInputMultiple [fInputId]="node.node_input_id + '2'" fInputConnectableSide="right" class="right"></div>
        <div fNodeInput fInputMultiple [fInputId]="node.node_input_id + '3'" fInputConnectableSide="bottom" class="bottom"></div>
        <div fNodeInput fInputMultiple [fInputId]="node.node_input_id + '4'" fInputConnectableSide="left" class="left"></div>

        <!-- Add output connector side in the 4 sides -->
        <div fNodeOutput fOutputMultiple [fOutputId]="node.node_output_id + '1'" fOutputConnectableSide="top" class="top"></div>
        <div fNodeOutput fOutputMultiple [fOutputId]="node.node_output_id + '2'" fOutputConnectableSide="right" class="right"></div>
        <div fNodeOutput fOutputMultiple [fOutputId]="node.node_output_id + '3'" fOutputConnectableSide="bottom" class="bottom"></div>
        <div fNodeOutput fOutputMultiple [fOutputId]="node.node_output_id + '4'" fOutputConnectableSide="left" class="left"></div>
      </ng-container>
    </app-node>

    <!-- Just get all existing connexions -->
    <f-connection
      *ngFor="let connection of connection_list"
      [fOutputId]="connection.connection_output_id"
      [fInputId]="connection.connection_input_id"
    >
      <app-connection
        fConnectionContent
        class="connection-label"
        [connection_id]="connection.connection_id"
        [cardinality]="connection.connection_label"
      >
      </app-connection>
    </f-connection>

  </f-canvas>
</f-flow>

<!-- Form used to manage node(entity and relation) data -->
<app-form
  *ngIf="is_node_form_showed"
  [closeModal]="hide_node_form"
  [nodeId]="curent_node_id"
  [nodeType]="curent_node_type"
  [nodeTitle]="curent_node_title"
  [nodeAttributes]="curent_node_attributes"
></app-form>

<div class="palette">
  <div fExternalItem [fData]="{type: 'entity'}">Entité</div>
  <div fExternalItem [fData]="{type: 'relation'}">Relation</div>
</div>
